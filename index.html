<!-- AUTH SYSTEM -->

<script>
// USERS DATABASE (local)
let users = JSON.parse(localStorage.getItem('pwani_users')) || [];
let currentUser = JSON.parse(localStorage.getItem('pwani_current_user'));

// SIGNUP / LOGIN
function auth(){
  if(currentUser) return;

  const action = prompt("Type: login or signup");

  if(action === "signup"){
    const name = prompt("Enter name");
    const phone = prompt("Enter phone (+254...)");
    const password = prompt("Create password");

    const user = {name, phone, password};
    users.push(user);
    localStorage.setItem('pwani_users', JSON.stringify(users));
    localStorage.setItem('pwani_current_user', JSON.stringify(user));
    currentUser = user;

  } else {
    const phone = prompt("Phone:");
    const password = prompt("Password:");

    const user = users.find(u => u.phone === phone && u.password === password);

    if(user){
      localStorage.setItem('pwani_current_user', JSON.stringify(user));
      currentUser = user;
    } else {
      alert("User not found");
      location.reload();
    }
  }
}

auth();
</script>

<script>
document.getElementById('userDisplay').innerText = currentUser.name;
name.value = currentUser.name;
phone.value = currentUser.phone;

let listings = JSON.parse(localStorage.getItem('pwani_listings')) || [];

const stayAmenities = ["WiFi","Swimming Pool","Air Conditioning","Ocean View","Parking"];
const carAmenities = ["GPS","AC","Bluetooth","Sunroof"];

function renderAmenities(type){
  const container = document.getElementById('amenitiesContainer');
  container.innerHTML = '';
  const list = type === 'stay' ? stayAmenities : carAmenities;
  list.forEach(a=>{
    container.innerHTML += `<label><input type="checkbox" class="amenity" value="${a}"> ${a}</label>`;
  });
}

function renderDynamicFields(type){
  const container = document.getElementById('dynamicFields');

  if(type === 'stay'){
    container.innerHTML = `
      <div class="bg-card">
        <input id="guests" placeholder="Max Guests" class="w-full p-3 border rounded mb-3">
        <input id="bedrooms" placeholder="Bedrooms" class="w-full p-3 border rounded">
      </div>`;
  } else {
    container.innerHTML = `
      <div class="bg-card">
        <input id="carType" placeholder="Car Type" class="w-full p-3 border rounded mb-3">
        <input id="seats" placeholder="Seats" class="w-full p-3 border rounded">
      </div>`;
  }
}

document.querySelectorAll('input[name="type"]').forEach(r=>{
  r.addEventListener('change', e=>{
    renderAmenities(e.target.value);
    renderDynamicFields(e.target.value);
  });
});

function addListing(){
  const type = document.querySelector('input[name="type"]:checked')?.value;
  if(!type){alert('Select listing type'); return;}

  const amenities = [];
  document.querySelectorAll('.amenity:checked').forEach(a=>amenities.push(a.value));
  if(customAmenity.value) amenities.push(customAmenity.value);

  const listing = {
    type,
    title:title.value,
    desc:desc.value,
    location:location.value,
    price:price.value,
    image:image.value,
    guests:document.getElementById('guests')?.value || '',
    bedrooms:document.getElementById('bedrooms')?.value || '',
    carType:document.getElementById('carType')?.value || '',
    seats:document.getElementById('seats')?.value || '',
    amenities,
    name:name.value,
    phone:phone.value,
    owner: currentUser.phone // 🔐 OWNER LINK
  };

  listings.push(listing);
  localStorage.setItem('pwani_listings', JSON.stringify(listings));

  alert('Listing Published 🚀');
  window.location.href = 'index.html';
}

function logout(){
  localStorage.removeItem('pwani_current_user');
  location.reload();
}
</script>
