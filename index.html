<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Marketplace | Discover Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Coastal Marketplace</h1>
            <div class="space-x-6 hidden md:flex">
                <a href="#" class="hover:text-blue-500">Home</a>
                <a href="#" class="hover:text-blue-500">Categories</a>
                <a href="#" class="hover:text-blue-500">Featured</a>
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">List an Item</button>
            </div>
        </div>
    </nav>

    <header class="bg-blue-600 py-16 px-4">
        <div class="max-w-4xl mx-auto text-center text-white">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">The Gateway to Local Assets</h2>
            <p class="text-lg opacity-90 mb-8">Buy, sell, or rent high-quality items within your community.</p>
            <div class="bg-white rounded-full p-2 flex items-center shadow-lg max-w-lg mx-auto">
                <input type="text" placeholder="Search for items, cars, or property..." class="flex-grow px-4 text-gray-800 outline-none">
                <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold">Search</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h3 class="text-2xl font-bold mb-8">Latest Listings</h3>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script src="script.js"></script>
</body>
    </html>
