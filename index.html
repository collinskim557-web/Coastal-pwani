<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Marketplace | Discover Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Coastal Marketplace</h1>
            <div class="space-x-6 hidden md:flex">
                <a href="#" class="hover:text-blue-500">Home</a>
                <a href="#" class="hover:text-blue-500">Categories</a>
                <a href="#" class="hover:text-blue-500">Featured</a>
                <button onclick="toggleForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    List an Item
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-blue-600 py-16 px-4">
        <div class="max-w-4xl mx-auto text-center text-white">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">The Gateway to Local Assets</h2>
            <p class="text-lg opacity-90 mb-8">Buy, sell, or rent high-quality items within your community.</p>
            <div class="bg-white rounded-full p-2 flex items-center shadow-lg max-w-lg mx-auto">
                <input type="text" placeholder="Search for items, cars, or property..." class="flex-grow px-4 text-gray-800 outline-none">
                <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold">Search</button>
            </div>
        </div>
    </header>

    <!-- 🔥 ADDED FORM (NEW ONLY) -->
    <div id="formBox" class="hidden max-w-4xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Post Item</h2>

        <input id="name" placeholder="Item Name" class="w-full border p-2 mb-2">
        <input id="price" placeholder="Price" class="w-full border p-2 mb-2">
        <input id="category" placeholder="Category" class="w-full border p-2 mb-2">
        <input id="image" placeholder="Image URL" class="w-full border p-2 mb-2">

        <button id="postBtn" class="bg-blue-600 text-white px-4 py-2 rounded">
            Post Item
        </button>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h3 class="text-2xl font-bold mb-8">Latest Listings</h3>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        </div>
    </main>

    <!-- 🔥 KEEP YOUR ORIGINAL SCRIPT -->
    <script>
    const items = [
        { name: "Premium Streetwear Jacket", price: "KSh 2,500", category: "Apparel", image: "https://via.placeholder.com/300x200" },
        { name: "Urban Sedan Rental", price: "KSh 5,000/day", category: "Vehicles", image: "https://via.placeholder.com/300x200" },
        { name: "Modern Studio Apartment", price: "KSh 25,000/mo", category: "Real Estate", image: "https://via.placeholder.com/300x200" },
        { name: "Canvas High-Tops", price: "KSh 3,200", category: "Footwear", image: "https://via.placeholder.com/300x200" }
    ];

    const grid = document.getElementById('product-grid');

    function renderItems() {
        grid.innerHTML = items.map(item => `
            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow">
                <img src="${item.image}" alt="${item.name}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <span class="text-xs font-semibold text-blue-500 uppercase">${item.category}</span>
                    <h4 class="text-lg font-bold mt-1">${item.name}</h4>
                    <p class="text-gray-600 mt-2">${item.price}</p>
                </div>
            </div>
        `).join('');
    }

    renderItems();
    </script>

    <!-- 🔥 FIREBASE (ADDED ONLY) -->
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKcnd952c81LyG0ofN_un-BCMdb0FzQ4w",
      authDomain: "coastal-marketing-38cae.firebaseapp.com",
      projectId: "coastal-marketing-38cae",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // toggle form
    window.toggleForm = function () {
        document.getElementById("formBox").classList.toggle("hidden");
    };

    // post item
    document.getElementById("postBtn").addEventListener("click", async () => {

        const name = document.getElementById("name").value;
        const price = document.getElementById("price").value;
        const category = document.getElementById("category").value;
        const image = document.getElementById("image").value;

        await addDoc(collection(db, "items"), {
            name, price, category, image
        });

        alert("Posted 🔥");
        loadItems();
    });

    // load from firebase
    async function loadItems() {
        const grid = document.getElementById("product-grid");
        const snapshot = await getDocs(collection(db, "items"));

        snapshot.forEach(doc => {
            const item = doc.data();

            grid.innerHTML += `
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <img src="${item.image}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h4 class="font-bold">${item.name}</h4>
                    <p>${item.price}</p>
                </div>
            </div>
            `;
        });
    }

    loadItems();
    </script>

</body>
  </html>
