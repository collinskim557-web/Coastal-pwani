<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khood Marketplace Premium</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body {
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
  color: white;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* HEADER */
header {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 22px;
}

header button {
  background: #0ea5e9;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 32px;
  margin-bottom: 20px;
}

/* SEARCH */
.search-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  display: inline-block;
}

.search-box input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

.search-box button {
  padding: 10px 20px;
  border: none;
  background: #0ea5e9;
  color: white;
  border-radius: 10px;
}

/* FORM */
.form {
  margin: 30px;
  padding: 20px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.form input, .form textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.form label {
  margin-top: 10px;
  display: block;
}

.form button {
  background: #0ea5e9;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}

/* LISTINGS */
.listings {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.6);
}

footer a {
  color: #0ea5e9;
  text-decoration: none;
  margin: 0 10px;
}

</style>
</head>

<body>

<header>
  <h1>🌊 Khood Marketplace</h1>
  <button onclick="managerLogin()">Manager</button>
</header>

<div class="hero">
  <h2>Find Stays & Cars in Style</h2>

  <div class="search-box">
    <input type="text" id="searchLocation" placeholder="Location">
    <input type="date">
    <input type="date">
    <button onclick="search()">Search</button>
  </div>
</div>

<!-- FORM -->
<div class="form">
  <h2>Post Listing</h2>

  <input type="text" id="title" placeholder="Title">
  <input type="number" id="price" placeholder="Price">
  <input type="text" id="location" placeholder="Location">
  <input type="text" id="phone" placeholder="Phone Number">
  <textarea id="description" placeholder="Description"></textarea>

  <label>Amenities:</label>
  <input type="checkbox" value="WiFi"> WiFi
  <input type="checkbox" value="Pool"> Pool
  <input type="checkbox" value="AC"> AC
  <input type="checkbox" value="Chef"> Chef
  <input type="checkbox" value="Jacuzzi"> Jacuzzi
  <input type="checkbox" value="Parking"> Parking

  <input type="file" id="image">

  <button onclick="addListing()">Post Listing</button>
</div>

<!-- LISTINGS -->
<div class="listings" id="listings"></div>

<footer>
  <p>© 2026 Khood Marketplace. All rights reserved.</p>
  <a href="#">Terms</a>
  <a href="#">Privacy</a>
</footer>

<script>
let listings = JSON.parse(localStorage.getItem("listings")) || [];

function getAmenities() {
  return Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
}

function addListing() {
  const file = document.getElementById("image").files[0];
  const reader = new FileReader();

  reader.onload = function () {
    const listing = {
      id: Date.now(),
      title: title.value,
      price: price.value,
      location: location.value,
      phone: phone.value,
      description: description.value,
      amenities: getAmenities(),
      image: reader.result
    };

    listings.push(listing);
    localStorage.setItem("listings", JSON.stringify(listings));
    displayListings();
  };

  if (file) reader.readAsDataURL(file);
}

function displayListings(data = listings) {
  const container = document.getElementById("listings");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.image}">
        <div class="card-content">
          <h3>${item.title}</h3>
          <p>${item.location}</p>
          <p>KES ${item.price}</p>
          <p>${item.description}</p>
          <p><b>${item.amenities.join(", ")}</b></p>
          <p>📞 ${item.phone}</p>
          ${localStorage.getItem("manager") ? `<button onclick="deleteListing(${item.id})">Delete</button>` : ""}
        </div>
      </div>
    `;
  });
}

function deleteListing(id) {
  listings = listings.filter(l => l.id !== id);
  localStorage.setItem("listings", JSON.stringify(listings));
  displayListings();
}

function search() {
  const loc = searchLocation.value.toLowerCase();
  const filtered = listings.filter(l => l.location.toLowerCase().includes(loc));
  displayListings(filtered);
}

function managerLogin() {
  const pass = prompt("Manager password");
  if (pass === "Collins2002") {
    localStorage.setItem("manager", "true");
    alert("Manager mode enabled");
    displayListings();
  }
}

displayListings();
</script>

</body>
                      </html>
